# Candidate models for evaluation.
#
# Pull with: ollama pull <tag>
# Reference: ollama.com/library/<family>/tags
#
# Tiers control orchestrator default selection:
#   tier1: must-evaluate set (~10 models, balanced size/quantization)
#   tier2: worth running if time permits
#   tier3: special cases (FP16 ceilings, QAT comparisons)

candidates:
  # ── Tier 1: balanced q4_K_M sweep across families ────────────────────
  - tag: qwen3:4b-instruct-2507-q4_K_M
    family: qwen3
    size_b: 4.0
    variant: instruct
    quantization: q4_K_M
    expected_vram_mb: 2500
    tier: 1
    notes: "Recommended baseline. Explicit instruct release."

  - tag: qwen3:4b-instruct-2507-q8_0
    family: qwen3
    size_b: 4.0
    variant: instruct
    quantization: q8_0
    expected_vram_mb: 4300
    tier: 1
    notes: "Higher precision comparator for the q4_K_M baseline."

  # Pure reasoning variants are excluded by policy. MemPalace
  # classification tasks always run with thinking disabled
  # (see benchmarks/model_eval/runner.py and the project memory
  # "no reasoning models for classification"). To benchmark a
  # hybrid model, use its base tag and the runner forces
  # think=False on every call.

  - tag: qwen2.5:3b-instruct-q4_K_M
    family: qwen2.5
    size_b: 3.0
    variant: instruct
    quantization: q4_K_M
    expected_vram_mb: 1900
    tier: 1
    notes: "Strong older comparator. Often punches above its size class."

  - tag: gemma3:4b-it-q4_K_M
    family: gemma3
    size_b: 4.0
    variant: instruct
    quantization: q4_K_M
    expected_vram_mb: 3300
    tier: 1
    notes: "Top non-Qwen contender at this size."

  - tag: gemma3:4b-it-qat
    family: gemma3
    size_b: 4.0
    variant: instruct
    quantization: qat
    expected_vram_mb: 4000
    tier: 1
    notes: "Quantization-aware-trained variant. Compare to post-hoc q4_K_M."

  - tag: gemma3:1b-it-q4_K_M
    family: gemma3
    size_b: 1.0
    variant: instruct
    quantization: q4_K_M
    expected_vram_mb: 815
    tier: 1
